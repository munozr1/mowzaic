name: mowzaic_provider
description: Mowzaic Provider — field app for lawn care service providers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Auth & backend
  supabase_flutter: ^2.8.4

  # State management
  provider: ^6.1.2

  # HTTP client
  http: ^1.2.2

  # Navigation
  go_router: ^14.6.2

  # Maps
  mapbox_maps_flutter: ^2.5.0

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # UI utilities
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
